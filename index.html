function dstr(d){if(!d)d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function pad2(n){return String(n).padStart(2,"0");}
function pad4(n){return String(n).padStart(4,"0");}
function nowMins(){return now.getHours()*60+now.getMinutes();}

// Format minutes-since-midnight to readable time e.g. 870 → "2:30 PM"
function fmtMin(m){
  var h=Math.floor(m/60),mn=m%60;
  var ampm=h<12?"AM":"PM";
  var h12=h===0?12:h>12?h-12:h;
  return h12+":"+(mn===0?"00":pad2(mn))+" "+ampm;
}

function ckKey(ds,site,type,schedMin){return ds+"||"+site+"||"+type+"||"+pad4(schedMin);}
function dbPath(ds,site,type,schedMin){return"/checks/"+ds+"/"+site+"/"+type+"/m"+pad4(schedMin);}
function assignPath(ds,site,type,schedMin){return"/assignments/"+ds+"/"+site+"/"+type+"/m"+pad4(schedMin);}
function nfKeyFn(ds,site,type,schedMin,k){return"nf|"+ds+"|"+site+"|"+type+"|"+pad4(schedMin)+"|"+k;}
function normName(n){return n.trim().toLowerCase().replace(/\s+/g,"_");}
function genDeviceId(){return"dev_"+Math.random().toString(36).substr(2,9)+Date.now().toString(36);}
function loadNotified(){try{var r=localStorage.getItem("wh_notified_"+dstr());return r?JSON.parse(r):[];}catch(e){return[];}}
function saveNotified(a){try{localStorage.setItem("wh_notified_"+dstr(),JSON.stringify(a));}catch(e){}}
function avatarLetter(name){return name?name.charAt(0).toUpperCase():"?";}

  var key=normName(myName);
  dbRead("/users/"+key).then(function(rec){
    if(!rec){regScreen=true;myName=null;localStorage.removeItem("wh_user_name");render();return;}
    var isFirstAdmin=(myName.trim().toLowerCase()===FIRST_ADMIN.trim().toLowerCase());
    if(isFirstAdmin&&(!rec.isAdmin||!rec.isSuperAdmin)){
      rec.isAdmin=true;rec.status="approved";rec.isSuperAdmin=true;
      dbWrite("/users/"+key,rec);
    }
    myStatus=rec.isAdmin?"admin":rec.status;
    render();loadAllUsers();startPolling();
  }).catch(function(){dbStatus="offline";render();});
}

function loadAllUsers(){
  dbRead("/users").then(function(data){allUsers=data||{};usersLoaded=true;render();}).catch(function(){});
  setInterval(function(){dbRead("/users").then(function(data){allUsers=data||{};render();}).catch(function(){});},30000);
}

// ── registration ──────────────────────────────────────────────
function tryRegister(){
  var name=regInput.trim();
  if(!name||name.length<2){regStatus="short";render();return;}
  regStatus="checking";render();
  var key=normName(name);
  dbRead("/users/"+key).then(function(existing){
    if(existing&&existing.deviceId&&existing.deviceId!==myDeviceId){regStatus="taken";render();return;}
    regStatus="saving";render();
    var isFirstAdmin=(name.trim().toLowerCase()===FIRST_ADMIN.trim().toLowerCase());
    dbRead("/users").then(function(allU){
      var order=Object.keys(allU||{}).length;
      var rec={displayName:name,deviceId:myDeviceId,registeredAt:new Date().toISOString(),
        status:isFirstAdmin?"approved":"pending",isAdmin:isFirstAdmin,
        isSuperAdmin:isFirstAdmin,order:order};
      return dbWrite("/users/"+key,rec);
    }).then(function(){
      myName=name;localStorage.setItem("wh_user_name",myName);
      regScreen=false;myStatus=isFirstAdmin?"admin":"pending";render();
      loadAllUsers();if(myStatus!=="pending")startPolling();
    }).catch(function(){regStatus="error";render();});
  }).catch(function(){regStatus="error";render();});
}

// ── data load ─────────────────────────────────────────────────
function loadData(){
  var cutoff=dstr(new Date(now.getFullYear(),now.getMonth(),now.getDate()-31));
  // Load assignments too
  dbRead("/assignments").then(function(aData){
    if(!aData)aData={};
    assignments={};
    var adsList=Object.keys(aData);
    var aCutoff=dstr(new Date(now.getFullYear(),now.getMonth(),now.getDate()-15));
    for(var i=0;i<adsList.length;i++){
      var ds=adsList[i];if(ds<aCutoff)continue;
      var sites=aData[ds]||{},sl=Object.keys(sites);
      for(var j=0;j<sl.length;j++){
        var site=sl[j],types=sites[site]||{},tl=Object.keys(types);
        for(var k=0;k<tl.length;k++){
          var type=tl[k],times=types[type]||{},tKeys=Object.keys(times);
          for(var l=0;l<tKeys.length;l++){
            var tKey=tKeys[l],mins=parseInt(tKey.substr(1));
            assignments[ckKey(ds,site,type,mins)]=times[tKey];
          }
        }
      }
    }
  }).catch(function(){});
  dbRead("/checks").then(function(data){
    if(!data)data={};
    checks={};
    var dsList=Object.keys(data);
    for(var i=0;i<dsList.length;i++){
      var ds=dsList[i];if(ds<cutoff)continue;
      var sites=data[ds]||{},sl=Object.keys(sites);
      for(var j=0;j<sl.length;j++){
        var site=sl[j],types=sites[site]||{},tl=Object.keys(types);
        for(var k=0;k<tl.length;k++){
          var type=tl[k],times=types[type]||{},tKeys=Object.keys(times);
          for(var l=0;l<tKeys.length;l++){
            var tKey=tKeys[l];
            // Support both old "h08" format and new "m0480" format
            var mins;
            if(tKey.charAt(0)==="m") mins=parseInt(tKey.substr(1));
            else mins=parseInt(tKey.substr(1))*60; // legacy hour-based
            checks[ckKey(ds,site,type,mins)]=times[tKey];
          }
        }
      }
    }
    dbStatus="online";render();
  }).catch(function(){dbStatus="offline";render();});
}
function startPolling(){loadData();setInterval(loadData,30000);}

// ── status ────────────────────────────────────────────────────
// Assign window: open all day from 4am for any unlogged check
function canAssign(schedMin,ds){
  if(ds!==dstr(now))return false;
  return nowMins()>=hm(4);
}

// 4 AM checks get a special window: open 15 mins early, missed only after 60 mins (5 AM)
function getWin(type,schedMin){
  var base=CHECK_CFG[type]||{earlyMins:15,lateMins:15};
  if(schedMin===hm(4)){return{earlyMins:15,lateMins:60};}
  return base;
}

function getStatus(site,type,schedMin,ds){
  var key=ckKey(ds,site,type,schedMin);
  var entry=checks[key];
  var isToday=(ds===dstr(now));
  var win=getWin(type,schedMin);
  if(entry){
    var logTime=new Date(entry.loggedAt);
    var logMin=logTime.getHours()*60+logTime.getMinutes();
    var minsLate=logMin-schedMin;
    return minsLate>win.lateMins?{s:"overdue",entry:entry}:{s:"done",entry:entry};
  }
  if(isToday){
    var diff=nowMins()-schedMin;
    if(diff>win.lateMins)   return{s:"missed",  entry:null};
    if(diff>=-win.earlyMins)return{s:"due",     entry:null};
    return{s:"upcoming",entry:null};
  }
  return{s:"missed",entry:null};
}

function canLogCheck(site,type,schedMin,ds){
  var res=getStatus(site,type,schedMin,ds);
  if(!res||res.s==="done"||res.s==="overdue")return false;
  if(ds!==dstr(now))return false;
  var win=getWin(type,schedMin);
  return (nowMins()-schedMin)>=-win.earlyMins;
}

function getStats(site,ds){
  if(!ds)ds=dstr(now);
  var sites=site?[site]:SITES;
  var done=0,overdue=0,missed=0,due=0,upcoming=0,total=0;
  for(var i=0;i<sites.length;i++){
    var s=sites[i],tk=Object.keys(SCH[s]);
    for(var j=0;j<tk.length;j++){
      var mins=SCH[s][tk[j]];
      for(var k=0;k<mins.length;k++){
        total++;
        var st=getStatus(s,tk[j],mins[k],ds).s;
        if(st==="done")done++;
        else if(st==="overdue")overdue++;
        else if(st==="missed")missed++;
        else if(st==="due")due++;
        else upcoming++;
      }
    }
  }
  return{done:done,overdue:overdue,missed:missed,due:due,upcoming:upcoming,total:total};
}

function badge(s){var m=STATUS_STYLE[s]||STATUS_STYLE.upcoming;return'<span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;background:'+m.bg+';color:'+m.c+'">'+m.label+'</span>';}

// ── check row ─────────────────────────────────────────────────
function buildTypeRow(site,type,schedMin,ds){
  var res=getStatus(site,type,schedMin,ds),s=res.s,entry=res.entry;
  var isToday=(ds===dstr(now)),canLog=canLogCheck(site,type,schedMin,ds);
  var isLogged=(s==="done"||s==="overdue");
  var m=STATUS_STYLE[s]||STATUS_STYLE.upcoming;
  var win=getWin(type,schedMin);
  var sub="";
  if(entry){
    var t=new Date(entry.loggedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    var photoThumb="";
    if(entry.photos&&entry.photos.length){
      photoThumb='<div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap">';
      for(var _pi=0;_pi<entry.photos.length;_pi++){
        photoThumb+='<img src="'+entry.photos[_pi]+'" data-viewphoto="'+entry.photos[_pi]+'" style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0;cursor:pointer"/>';
      }
      photoThumb+='</div>';
    }
    sub='<div style="font-size:12px;color:#64748b;margin-top:2px">By '+entry.name+' &middot; '+t+(s==="overdue"?' <span style="color:#c2410c">(late)</span>':'')+'</div>'+(entry.comment?'<div style="font-size:11px;color:#94a3b8;margin-top:2px;font-style:italic">&ldquo;'+entry.comment+'&rdquo;</div>':'')+photoThumb;
  } else if(s==="missed"){sub='<div style="font-size:12px;color:#991b1b;margin-top:2px">Not completed</div>';}
  else if(s==="due"){sub='<div style="font-size:12px;color:#ca8a04;margin-top:2px">Tap to log now</div>';}
  else if(s==="upcoming"&&canLog){sub='<div style="font-size:12px;color:#64748b;margin-top:2px">Ready &mdash; tap to log early</div>';}
  else if(s==="upcoming"){
    var minsUntil=(-win.earlyMins)-(nowMins()-schedMin);
    sub='<div style="font-size:12px;color:#94a3b8;margin-top:2px">Opens in ~'+minsUntil+' min</div>';
  }
  // Assignment
  var assignKey=ckKey(ds,site,type,schedMin);
  var assignEntry=assignments[assignKey];
  var showAssign=isToday&&!isLogged&&canAssign(schedMin,ds);
  var assignUI="";
  if(showAssign){
    if(assignEntry){
      // Already assigned
      var isMyAssign=(myName&&assignEntry.assignedTo.trim().toLowerCase()===myName.trim().toLowerCase());
      assignUI='<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'+
        '<span style="font-size:11px;color:#64748b">Assigned to <strong>'+assignEntry.assignedTo+'</strong></span>'+
        (isMyAssign||myStatus==="admin"?'<button data-unassign="'+site+'||'+type+'||'+schedMin+'||'+ds+'" style="font-size:10px;padding:2px 6px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;color:#94a3b8">&#10005;</button>':'')+
      '</div>';
    } else {
      if(myStatus==="admin"){
        assignUI='<div style="margin-top:4px"><button data-assignpick="'+site+'||'+type+'||'+schedMin+'||'+ds+'" style="font-size:11px;padding:3px 10px;border-radius:8px;border:1px solid #185FA5;background:#eff6ff;color:#185FA5;font-weight:600">Assign &darr;</button></div>';
      } else {
        assignUI='<div style="margin-top:4px"><button data-assignself="'+site+'||'+type+'||'+schedMin+'||'+ds+'" style="font-size:11px;padding:3px 10px;border-radius:8px;border:1px solid #185FA5;background:#eff6ff;color:#185FA5;font-weight:600">Assign me</button></div>';
      }
    }
  }

  var rightSide="";
  if(isLogged&&isToday){
    rightSide='<div style="display:flex;align-items:center;gap:6px">'+
      '<button data-edit="'+site+'||'+type+'||'+schedMin+'||'+ds+'" style="width:30px;height:30px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">&#9998;</button>'+
      badge(s)+'</div>';
  } else {rightSide=badge(s);}
  var logAttr=canLog?'data-log="'+site+'||'+type+'||'+schedMin+'||'+ds+'"':'';
  return '<div '+logAttr+' style="display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;border:1px solid '+m.rowBdr+';background:'+m.rowBg+';cursor:'+(canLog?"pointer":"default")+';margin-bottom:6px">'+
    '<div style="flex:1"><div style="font-weight:'+(s==="done"?"400":"500")+';font-size:14px;color:'+(s==="done"?"#94a3b8":"#1e293b")+'">'+CHECK_CFG[type].label+'</div>'+assignUI+sub+'</div>'+rightSide+'</div>';
}

// ── time blocks ───────────────────────────────────────────────
function buildTimeBlocks(site,ds){
  var allMins={},typeKeys=Object.keys(SCH[site]);
  for(var i=0;i<typeKeys.length;i++){var mins=SCH[site][typeKeys[i]];for(var j=0;j<mins.length;j++)allMins[mins[j]]=true;}
  var sortedMins=Object.keys(allMins).map(Number).sort(function(a,b){return a-b;});
  var html="";
  for(var hi=0;hi<sortedMins.length;hi++){
    var sm=sortedMins[hi];
    var typesAtTime=typeKeys.filter(function(type){return SCH[site][type].indexOf(sm)>=0;});
    if(!typesAtTime.length)continue;
    var statuses=typesAtTime.map(function(type){return getStatus(site,type,sm,ds).s;});
    var hasMissed=statuses.indexOf("missed")>=0,hasOverdue=statuses.indexOf("overdue")>=0,
        hasDue=statuses.indexOf("due")>=0,allDone=statuses.every(function(s){return s==="done";});
    var hStyle=hasMissed?STATUS_STYLE.missed:hasOverdue?STATUS_STYLE.overdue:hasDue?STATUS_STYLE.due:allDone?STATUS_STYLE.done:{bg:"#f8fafc",c:"#475569",rowBdr:"#e2e8f0"};
    html+='<div style="margin-bottom:14px">';
    // Determine block priority for auto-scroll targeting
    var blockPriority=hasMissed?"missed":hasOverdue?"overdue":hasDue?"due":allDone?"done":"upcoming";
    html+='<div data-timeblock="'+blockPriority+'" style="display:flex;align-items:center;gap:8px;background:'+hStyle.bg+';border:1px solid '+hStyle.rowBdr+';border-radius:10px 10px 0 0;padding:9px 14px;font-size:14px;font-weight:700;color:'+hStyle.c+'">';
    html+=fmtMin(sm)+' <span style="font-size:12px;font-weight:400;opacity:0.75">&mdash; '+typesAtTime.length+' check'+(typesAtTime.length>1?'s':'')+'</span></div>';
    html+='<div style="border:1px solid '+hStyle.rowBdr+';border-top:none;border-radius:0 0 10px 10px;padding:8px 8px 2px;background:#fff">';
    for(var ti=0;ti<typesAtTime.length;ti++)html+=buildTypeRow(site,typesAtTime[ti],sm,ds);
    html+='</div></div>';
  }
  return html;
}

// ── overview ──────────────────────────────────────────────────
function statBox(v,c,l){return'<div><div style="font-size:18px;font-weight:600;color:'+c+'">'+v+'</div><div style="font-size:10px;color:#64748b">'+l+'</div></div>';}
function siteStatBox(v,c,l){return'<div style="background:rgba(255,255,255,0.8);border-radius:10px;border:1px solid rgba(0,0,0,0.08);padding:8px 4px;text-align:center"><div style="font-size:18px;font-weight:600;color:'+c+'">'+v+'</div><div style="font-size:10px;color:#64748b">'+l+'</div></div>';}

function buildOverview(){
  var st=getStats(null,dstr(now));
  var html='<div style="background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:16px;margin-bottom:14px">';
  html+='<div style="font-size:12px;color:#64748b;margin-bottom:10px">Today &mdash; '+now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})+'</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;text-align:center">';
  html+=statBox(st.total,"#1e293b","Total")+statBox(st.done,"#16a34a","Done")+statBox(st.due,"#854d0e","Due")+statBox(st.missed,"#991b1b","Missed")+statBox(st.overdue,"#c2410c","Late");
  html+='</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  for(var i=0;i<SITES.length;i++){
    var site=SITES[i],s=getStats(site),c=SITE_CFG[site];
    var p=s.total>0?Math.round((s.done/s.total)*100):100;
    var barCol=s.missed>0?"#ef4444":s.overdue>0?"#f97316":c.color;
    var bdr=(s.missed>0||s.overdue>0)?"1.5px solid #fca5a5":"1px solid #e2e8f0";
    html+='<div data-ovsite="'+site+'" style="background:#fff;border-radius:14px;border:'+bdr+';padding:12px;cursor:pointer;border-left:4px solid '+c.color+'">';
    html+='<div style="font-weight:600;font-size:15px;color:'+c.color+';margin-bottom:6px">'+site+'</div>';
    html+='<div style="height:5px;background:#f1f5f9;border-radius:3px;margin-bottom:8px;overflow:hidden"><div style="height:100%;width:'+p+'%;background:'+barCol+';border-radius:3px"></div></div>';
    html+='<div style="font-size:11px;color:#64748b;line-height:1.8"><span style="color:#16a34a;font-weight:600">'+s.done+'</span> done';
    if(s.due>0)    html+=' &middot; <span style="color:#854d0e;font-weight:600">'+s.due+'</span> due';
    if(s.missed>0) html+=' &middot; <span style="color:#991b1b;font-weight:600">'+s.missed+'</span> missed';
    if(s.overdue>0)html+=' &middot; <span style="color:#c2410c;font-weight:600">'+s.overdue+'</span> late';
    html+='</div></div>';
  }
  return html+'</div>'+buildCurrentChecks();
}



// ── current checks box ────────────────────────────────────────
// Slot logic: for hour H, show from H-1:45 to H:45
// e.g. 13:45 to 14:45 shows "2pm - 3pm" (checks between 14:00 and 15:00)
function buildCurrentChecks(){
  var nm=nowMins();
  var ds=dstr(now);

  // Find current slot: the nearest whole hour such that nm is in [H-15, H+45)
  // i.e. H = ceil((nm+15) / 60) * 60
  var slotStart=Math.floor((nm+15)/60)*60;
  var windowStart=slotStart-15;
  var windowEnd=slotStart+45;

  var slotEnd=slotStart+60;
  var inWindow=(nm>=windowStart&&nm<windowEnd);

  // Collect all checks across all sites in this slot (only if in window)
  var total=0,done=0,pending=0;
  var siteRows={};
  if(inWindow){
    for(var si=0;si<SITES.length;si++){
      var site=SITES[si];
      var c=SITE_CFG[site];
      var typeKeys=Object.keys(SCH[site]);
      var pendingItems=[],doneItems=[];
      for(var ti=0;ti<typeKeys.length;ti++){
        var type=typeKeys[ti];
        var mins=SCH[site][type];
        for(var mi=0;mi<mins.length;mi++){
          var sm=mins[mi];
          if(sm<slotStart||sm>=slotEnd)continue;
          total++;
          var res=getStatus(site,type,sm,ds);
          var s=res.s,entry=res.entry;
          var isDone=(s==="done"||s==="overdue");
          if(isDone){done++;doneItems.push({type:type,sm:sm,s:s,entry:entry});}
          else{pending++;pendingItems.push({type:type,sm:sm,s:s,entry:entry});}
        }
      }
      if(pendingItems.length+doneItems.length>0){
        siteRows[site]={c:c,pending:pendingItems,done:doneItems};
      }
    }
  }

  var heading=inWindow&&total>0
    ?"Current checks ("+fmtMin(slotStart)+" &ndash; "+fmtMin(slotEnd)+")"
    :"Current checks";

  var html='<div style="background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:16px;margin-top:14px">';
  html+='<div style="font-weight:700;font-size:15px;color:#1e293b;margin-bottom:12px">'+heading+'</div>';
  if(!inWindow||total===0){
    html+='<div style="background:#f8fafc;border-radius:10px;padding:14px;text-align:center;font-size:13px;color:#94a3b8">No checks scheduled at this time</div>';
    html+='</div>';
    return html;
  }
  // Summary pills
  html+='<div style="display:flex;gap:8px;margin-bottom:14px">';
  html+='<span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:#f1f5f9;color:#475569">'+total+' total</span>';
  html+='<span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:#dcfce7;color:#166534">'+done+' done</span>';
  html+='<span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:#fef9c3;color:#854d0e">'+pending+' pending</span>';
  html+='</div>';

  // Per-site rows in order: Fuji, Koi, Bonsai, Yuzu
  for(var si=0;si<SITES.length;si++){
    var site=SITES[si];
    if(!siteRows[site])continue;
    var c=siteRows[site].c;
    var pendingItems=siteRows[site].pending;
    var doneItems=siteRows[site].done;
    html+='<div style="margin-bottom:12px">';
    html+='<div style="font-size:12px;font-weight:700;color:'+c.color+';margin-bottom:6px;display:flex;align-items:center;gap:6px">'+
      '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c.color+'"></span>'+site+'</div>';
    // Pending items first
    for(var pi=0;pi<pendingItems.length;pi++){
      var item=pendingItems[pi];
      var m=STATUS_STYLE[item.s]||STATUS_STYLE.upcoming;
      var aKey=ckKey(ds,site,item.type,item.sm);
      var aEntry=assignments[aKey];
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;background:'+m.rowBg+';border:1px solid '+m.rowBdr+';margin-bottom:4px">';
      html+='<div style="flex:1;min-width:0">';
      html+='<div style="font-size:13px;font-weight:500;color:#1e293b">'+CHECK_CFG[item.type].label+'</div>';
      html+='<div style="font-size:11px;color:#94a3b8;margin-top:1px">'+fmtMin(item.sm)+'</div>';
      html+='</div>';
      // Assign button or assigned name — inline, left of status badge
      var isMyAssign=aEntry&&myName&&aEntry.assignedTo.trim().toLowerCase()===myName.trim().toLowerCase();
      if(aEntry){
        html+='<div style="display:flex;align-items:center;gap:4px;flex-shrink:0;margin-right:6px">';
        html+='<span style="font-size:11px;color:#64748b;white-space:nowrap">'+aEntry.assignedTo+'</span>';
        if(isMyAssign||myStatus==="admin"){
          html+='<button data-unassign="'+site+'||'+item.type+'||'+item.sm+'||'+ds+'" style="font-size:10px;padding:1px 5px;border-radius:5px;border:1px solid #e2e8f0;background:#f8fafc;color:#94a3b8;cursor:pointer;flex-shrink:0">&#10005;</button>';
        }
        html+='</div>';
      } else if(myStatus==="admin"){
        html+='<button data-assignpick="'+site+'||'+item.type+'||'+item.sm+'||'+ds+'" style="font-size:11px;padding:3px 8px;border-radius:8px;border:1px solid #185FA5;background:#eff6ff;color:#185FA5;font-weight:600;cursor:pointer;flex-shrink:0;margin-right:6px;white-space:nowrap">Assign &darr;</button>';
      } else {
        html+='<button data-assignself="'+site+'||'+item.type+'||'+item.sm+'||'+ds+'" style="font-size:11px;padding:3px 8px;border-radius:8px;border:1px solid #185FA5;background:#eff6ff;color:#185FA5;font-weight:600;cursor:pointer;flex-shrink:0;margin-right:6px;white-space:nowrap">Assign me</button>';
      }
      html+='<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:'+m.bg+';color:'+m.c+';flex-shrink:0">'+m.label+'</span>';
      html+='</div>';
    }
    // Done items below
    for(var di=0;di<doneItems.length;di++){
      var item=doneItems[di];
      var m=STATUS_STYLE[item.s]||STATUS_STYLE.done;
      var t=item.entry?new Date(item.entry.loggedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;margin-bottom:4px;opacity:0.75">';
      html+='<div><div style="font-size:13px;font-weight:400;color:#94a3b8">'+CHECK_CFG[item.type].label+'</div>';
      html+='<div style="font-size:11px;color:#94a3b8;margin-top:1px">'+(item.entry?"By "+item.entry.name+" &middot; "+t:fmtMin(item.sm))+'</div></div>';

      html+='</div>';
    }
    html+='</div>';
  }
  html+='</div>';
  return html;
}

// ── overview factory detail ───────────────────────────────────
function buildOverviewSiteDetail(site){
  var ds=dstr(now),s=getStats(site,ds),c=SITE_CFG[site];
  var pct=s.total>0?Math.round((s.done/s.total)*100):100;
  var barCol=s.missed>0?"#ef4444":s.overdue>0?"#f97316":c.color;

  // Collect missed and late checks in time order
  var missedChecks=[],lateChecks=[];
  var typeKeys=Object.keys(SCH[site]);
  var allMins={};
  for(var i=0;i<typeKeys.length;i++){var mins=SCH[site][typeKeys[i]];for(var j=0;j<mins.length;j++)allMins[mins[j]]=true;}
  var sortedMins=Object.keys(allMins).map(Number).sort(function(a,b){return a-b;});
  for(var hi=0;hi<sortedMins.length;hi++){
    var sm=sortedMins[hi];
    for(var ti=0;ti<typeKeys.length;ti++){
      var type=typeKeys[ti];
      if(SCH[site][type].indexOf(sm)<0)continue;
      var res=getStatus(site,type,sm,ds);
      if(res.s==="missed") missedChecks.push({type:type,sm:sm,entry:res.entry});
      else if(res.s==="overdue") lateChecks.push({type:type,sm:sm,entry:res.entry});
    }
  }

  var html='';
  // Back button
  html+='<div id="ov-back-btn" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;padding:8px 14px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;color:#475569;cursor:pointer">&larr; Back to overview</div>';

  // Header card
  html+='<div style="background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:16px;margin-bottom:16px;border-left:4px solid '+c.color+'">';
  html+='<div style="font-weight:700;font-size:18px;color:'+c.color+';margin-bottom:12px">'+site+'</div>';
  // Big % done
  html+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">';
  html+='<div style="font-size:36px;font-weight:700;color:'+(pct===100?"#16a34a":pct>=60?"#d97706":"#dc2626")+'">'+pct+'%</div>';
  html+='<div style="flex:1">';
  html+='<div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;margin-bottom:6px"><div style="height:100%;width:'+pct+'%;background:'+barCol+';border-radius:5px"></div></div>';
  html+='<div style="font-size:12px;color:#64748b">'+s.done+' of '+s.total+' checks completed today</div>';
  html+='</div></div>';
  // Stat pills
  html+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
  html+='<span style="font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:#dcfce7;color:#166634">'+s.done+' done</span>';
  if(s.due>0)    html+='<span style="font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:#fef9c3;color:#854d0e">'+s.due+' due now</span>';
  if(s.missed>0) html+='<span style="font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:#fee2e2;color:#991b1b">'+s.missed+' missed</span>';
  if(s.overdue>0)html+='<span style="font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:#ffedd5;color:#c2410c">'+s.overdue+' late</span>';
  html+='</div></div>';

  // Missed section
  html+='<div style="margin-bottom:16px">';
  html+='<div style="font-size:13px;font-weight:700;color:#991b1b;margin-bottom:8px;display:flex;align-items:center;gap:8px">'+
    '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ef4444"></span>Missed checks</div>';
  if(missedChecks.length===0){
    html+='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;text-align:center;font-size:13px;color:#166534">No missed checks</div>';
  } else {
    for(var i=0;i<missedChecks.length;i++){
      var ck=missedChecks[i];
      html+='<div style="background:#fff1f2;border:1px solid #fecdd3;border-radius:10px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">'+
        '<div><div style="font-weight:600;font-size:14px;color:#1e293b">'+CHECK_CFG[ck.type].label+'</div>'+
        '<div style="font-size:12px;color:#64748b;margin-top:2px">Scheduled at '+fmtMin(ck.sm)+'</div></div>'+
        '<span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#fee2e2;color:#991b1b">Missed</span>'+
      '</div>';
    }
  }
  html+='</div>';

  // Late section
  html+='<div style="margin-bottom:16px">';
  html+='<div style="font-size:13px;font-weight:700;color:#c2410c;margin-bottom:8px;display:flex;align-items:center;gap:8px">'+
    '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#f97316"></span>Late checks</div>';
  if(lateChecks.length===0){
    html+='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;text-align:center;font-size:13px;color:#166534">No late checks</div>';
  } else {
    for(var i=0;i<lateChecks.length;i++){
      var ck=lateChecks[i];
      var logTime=ck.entry?new Date(ck.entry.loggedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
      html+='<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">'+
        '<div><div style="font-weight:600;font-size:14px;color:#1e293b">'+CHECK_CFG[ck.type].label+'</div>'+
        '<div style="font-size:12px;color:#64748b;margin-top:2px">Scheduled '+fmtMin(ck.sm)+(ck.entry?' &middot; logged at '+logTime+' by '+ck.entry.name:'')+'</div></div>'+
        '<span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#ffedd5;color:#c2410c">Late</span>'+
      '</div>';
    }
  }
  html+='</div>';

  return html;
}

function buildSite(site){

// ── team tab ──────────────────────────────────────────────────
function buildTeam(){
  if(!usersLoaded)return'<div style="text-align:center;padding:40px;color:#64748b">Loading team...</div>';
  var admins=[],members=[];
  var keys=Object.keys(allUsers).sort(function(a,b){return(allUsers[a].order||0)-(allUsers[b].order||0);});
  for(var i=0;i<keys.length;i++){
    var u=allUsers[keys[i]];
    if(u.status!=="approved"&&!u.isAdmin)continue;
    if(u.isAdmin)admins.push(u);else members.push(u);
  }
  var html='<div style="font-size:13px;color:#64748b;margin-bottom:12px">'+(admins.length+members.length)+' team member'+(admins.length+members.length!==1?'s':'')+' active</div>';
  if(admins.length>0){
    html+='<div style="font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Admins</div>';
    for(var i=0;i<admins.length;i++){var u=admins[i];html+=buildMemberCard(u,(myName&&myName.trim().toLowerCase()===u.displayName.trim().toLowerCase()),true);}
  }
  if(members.length>0){
    html+='<div style="font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;margin-top:16px">Team members</div>';
    for(var i=0;i<members.length;i++){var u=members[i];html+=buildMemberCard(u,(myName&&myName.trim().toLowerCase()===u.displayName.trim().toLowerCase()),false);}
  }
  return html;
}

function buildAssignModal(){

function buildModal(){
  if(!modal)return"";

  var infoBar='<div style="font-size:13px;color:#64748b;background:#f8fafc;border-radius:10px;padding:9px 13px;margin-bottom:16px"><span style="color:'+c.color+';font-weight:600">'+site+'</span> &mdash; '+CHECK_CFG[type].label+' &mdash; '+fmtMin(schedMin)+'</div>';
  var wrap='<div id="overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;z-index:200">'+
    '<div style="background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-width:430px;margin:0 auto;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch">'+
    '<div style="width:38px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 18px"></div>';
  if(modal.mode==="edit"){
    var entry=checks[ckKey(ds,site,type,schedMin)];
    var logTime=entry?new Date(entry.loggedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
    var isOwner=entry&&myName&&myName.trim().toLowerCase()===entry.name.trim().toLowerCase();
    wrap+='<div style="font-weight:700;font-size:18px;margin-bottom:5px">Edit log</div>'+infoBar;
    wrap+='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 14px;margin-bottom:16px">';
    wrap+='<div style="font-size:12px;color:#64748b;margin-bottom:3px">Logged by</div>';
    wrap+='<div style="font-weight:600;font-size:15px;color:#166534">'+(entry?entry.name:"&mdash;")+'</div>';
    wrap+='<div style="font-size:12px;color:#64748b;margin-top:2px">at '+logTime+'</div></div>';
    wrap+='<div style="display:flex;flex-direction:column;gap:10px">';
    if(isOwner){
      wrap+='<button id="relog-btn" style="width:100%;padding:13px;border-radius:10px;border:none;background:#185FA5;color:#fff;font-size:15px;font-weight:600">&#8635; &nbsp;Log again (replace)</button>';
      wrap+='<button id="delete-btn" style="width:100%;padding:13px;border-radius:10px;border:1.5px solid #fecdd3;background:#fff1f2;color:#991b1b;font-size:15px;font-weight:600">'+(saving?"Deleting...":"&#10005; &nbsp;Delete this log")+'</button>';
    } else {
      wrap+='<div style="background:#fff1f2;border:1px solid #fecdd3;border-radius:10px;padding:16px;text-align:center">'+
        '<div style="font-size:28px;margin-bottom:8px">&#128274;</div>'+
        '<div style="font-weight:700;font-size:14px;color:#991b1b;margin-bottom:6px">Access restricted</div>'+
        '<div style="font-size:13px;color:#64748b">Only <span style="font-weight:600;color:#1e293b">'+(entry?entry.name:"the logger")+'</span> can edit or delete this log.</div></div>';
    }
    wrap+='<button id="cancel-btn" style="width:100%;padding:13px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;color:#64748b;font-size:14px">Close</button>';
    wrap+='</div>';
  } else {
    // Determine if this is a missed check (needs reason) or normal (needs comment)
    var isMissed = (getStatus(site,type,schedMin,ds).s === "missed");
    var title=modal.mode==="relog"?"Log again":"Log check";
    wrap+='<div style="font-weight:700;font-size:18px;margin-bottom:5px">'+title+'</div>'+infoBar;
    if(modal.mode==="relog")wrap+='<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:13px;color:#c2410c">This will replace the existing log entry.</div>';
    // Missed check warning
    if(isMissed){
      wrap+='<div style="background:#fff1f2;border:1px solid #fecdd3;border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:13px;color:#991b1b">This check is past its time window and will be logged as <strong>Late</strong>.</div>';
    }
    // Logging as pill
    wrap+='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px">'+
      '<div style="width:36px;height:36px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#166534;flex-shrink:0">'+avatarLetter(myName)+'</div>'+
      '<div><div style="font-size:12px;color:#64748b">Logging as</div><div style="font-weight:600;font-size:15px;color:#166534">'+(myName||"Unknown")+'</div></div></div>';
    // ── Fuji Mice Extra Fields ───────────────────────────────────
    if(site==="Fuji"&&type==="mice"){
      wrap+=buildFujiMiceFields();
    }

    // Reason field (missed) or Comment field (normal) — both optional
    if(isMissed){
      wrap+='<label style="display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:#991b1b">Reason for late log <span style="font-weight:400;color:#94a3b8">(optional)</span></label>';
      wrap+='<textarea id="modal-comment" maxlength="200" placeholder="e.g. System issue, shift changeover..." '+
        'style="width:100%;padding:11px 13px;border:1.5px solid #fecdd3;border-radius:10px;font-size:14px;color:#1e293b;background:#fff1f2;resize:none;height:80px;outline:none;font-family:inherit;margin-bottom:6px">'+modalComment.replace(/</g,"&lt;")+'</textarea>';
    } else {
      wrap+='<label style="display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:#475569">Comments <span style="font-weight:400;color:#94a3b8">(optional)</span></label>';
      wrap+='<textarea id="modal-comment" maxlength="200" placeholder="Any issues or observations found during this check..." '+
        'style="width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;background:#f8fafc;resize:none;height:80px;outline:none;font-family:inherit;margin-bottom:6px">'+modalComment.replace(/</g,"&lt;")+'</textarea>';
    }
    wrap+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><span id="char-count" style="font-size:11px;color:#94a3b8">'+modalComment.length+'/200</span></div>';

    // ── Photo upload section ──────────────────────────────────
    var photoRule=PHOTO_RULES[type]||{min:0,max:2,required:false};
    var photoCount=modalPhotos.length;
    var photoLabel=photoRule.required
      ?'Photos <span style="color:#991b1b;font-weight:600">*required</span> (min '+photoRule.min+', max '+photoRule.max+')'
      :'Photos <span style="font-weight:400;color:#94a3b8">(optional, max '+photoRule.max+')</span>';
    wrap+='<div style="margin-bottom:14px">';
    wrap+='<label style="display:block;font-weight:600;font-size:13px;margin-bottom:8px;color:#475569">'+photoLabel+'</label>';
    // Thumbnails
    if(photoCount>0){
      wrap+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
      for(var pi=0;pi<modalPhotos.length;pi++){
        wrap+='<div style="position:relative;width:72px;height:72px">';
        wrap+='<img src="'+modalPhotos[pi].dataUrl+'" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0"/>';
        wrap+='<button data-removephoto="'+pi+'" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:#ef4444;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1">&#10005;</button>';
        wrap+='</div>';
      }
      wrap+='</div>';
    }
    // Add photo button + picker popup
    if(photoCount<photoRule.max){
      wrap+='<label style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1.5px dashed #cbd5e1;background:#f8fafc;color:#475569;font-size:13px;font-weight:600;cursor:pointer">Add photo<input type="file" id="photo-input" accept="image/*" style="display:none"/></label>';
    }
    // Progress indicator during upload
    if(uploadingPhotos){
      wrap+='<div style="font-size:12px;color:#185FA5;margin-top:6px">Uploading photos...</div>';
    }
    // Requirement message
    if(photoRule.required&&photoCount<photoRule.min){
      var needed=photoRule.min-photoCount;
      wrap+='<div style="font-size:12px;color:#991b1b;margin-top:6px">Please add '+needed+' more photo'+(needed>1?'s':'')+'</div>';
    }
    wrap+='</div>';

    // Confirm button — disabled if photos not met
    var photosMet=!photoRule.required||(photoCount>=photoRule.min);
    var fujiMiceMet=true;
    if(site==="Fuji"&&type==="mice"){
      fujiMiceMet=(
        modalTorchBefore!==null&&
        modalTorchAfter!==null&&
        modalAreas[0].pestActivity!==null&&
        modalAreas[1].pestActivity!==null
      );
    }
    var confirmBg=(!photosMet||!fujiMiceMet||saving||uploadingPhotos)?"#94a3b8":"#185FA5";
    wrap+='<div style="display:flex;gap:10px">'+
      '<button id="cancel-btn" style="flex:1;padding:13px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;font-size:14px;color:#64748b">Cancel</button>'+
      '<button id="confirm-btn" '+((!photosMet||!fujiMiceMet||uploadingPhotos)?"disabled":"")+' style="flex:2;padding:13px;border-radius:10px;border:none;background:'+confirmBg+';color:#fff;font-size:15px;font-weight:600;opacity:'+((!photosMet||!fujiMiceMet||uploadingPhotos)?0.6:1)+'">'+(saving?"Saving...":(uploadingPhotos?"Uploading...":"Confirm"))+'</button>'+
    '</div>';
  }
  return wrap+'</div></div>';
}

function buildFujiMiceFields(){
  var html2="";
  var btnBase="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;";

  // Torch Before
  html2+='<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:12px">';
  html2+='<div style="font-weight:700;font-size:13px;color:#1e293b;margin-bottom:8px">Torch check before use</div>';
  html2+='<div style="display:flex;gap:8px;margin-bottom:0">';
  html2+='<button data-torchbefore="Pass" style="'+btnBase+'flex:1;background:'+(modalTorchBefore==="Pass"?"#16a34a":"#f1f5f9")+';color:'+(modalTorchBefore==="Pass"?"#fff":"#475569")+'">Pass</button>';
  html2+='<button data-torchbefore="Fail" style="'+btnBase+'flex:1;background:'+(modalTorchBefore==="Fail"?"#dc2626":"#f1f5f9")+';color:'+(modalTorchBefore==="Fail"?"#fff":"#475569")+'">Fail</button>';
  html2+='</div>';
  if(modalTorchBefore==="Fail"){
    html2+='<div style="margin-top:10px">';
    html2+='<label style="display:block;font-size:12px;font-weight:600;color:#dc2626;margin-bottom:5px">Corrective action <span style="font-weight:400;color:#94a3b8">(optional)</span></label>';
    html2+='<textarea id="tba-text" maxlength="200" placeholder="Describe corrective action..." style="width:100%;padding:9px 11px;border:1.5px solid #fecdd3;border-radius:8px;font-size:13px;background:#fff1f2;resize:none;height:60px;outline:none;font-family:inherit">'+modalTorchBeforeAction.replace(/</g,"&lt;")+'</textarea>';
    html2+='</div>';
  }
  html2+='</div>';

  // Areas
  var areaLabels=["Ambient Storage (all pallet aisle and surrounding area)","Area Adjacent to Sauce Pot (e.g. near waste hatch)"];
  for(var ai=0;ai<2;ai++){
    var ar=modalAreas[ai];
    html2+='<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:12px">';
    html2+='<div style="font-weight:700;font-size:12px;color:#475569;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.3px">Area '+(ai+1)+'</div>';
    html2+='<div style="font-size:13px;font-weight:600;color:#1e293b;margin-bottom:8px">'+areaLabels[ai]+'</div>';

// ── Download Fuji Mice Form ───────────────────────────────────
function downloadFujiMiceForm(ds){

  var miceSchedule=[360,480,600,720,840,960,1080,1200,1320];

  // Build the page groups: [6am], [8am,10am], [12pm,2pm], [4pm,6pm], [8pm,10pm]
  var pageGroups=[[360],[480,600],[720,840],[960,1080],[1200,1320]];

  var introHTML='<div style="font-size:8.5pt;line-height:1.4;margin-bottom:8px"><u>Mice dropping checks:</u><br>Koi Building – Chilled warehouse &amp; office room, Chilled Storage &amp; Ambient storage, must be checked for pest activity every day as per below list at specified times (refer to "Intended Time of Check"). Record actual time of the check +/- 15 minutes discrepancy is allowed between the intended time of check and actual time of check and recorded the time accordingly.<br>The following should be considered during inspections:<br>&nbsp;&nbsp;&nbsp;- LOOK – droppings, urine stains, footprints (e.g. on dust) and grease/smear marks, damage to property and/or stock, signs of chewing/gnawing, nests<br>&nbsp;&nbsp;&nbsp;- SMELL – foul or unusual odour<br>&nbsp;&nbsp;&nbsp;- LISTEN – unusual rustling noises<br>Corrective Actions - If pest Activity is evident, write yes below and inform QA/Technical Team immediately. Then inform hygiene to clean the area. Hygiene clean up must be done immediately after issue reported by the team. Follow up check must be carried out in the area where pest activity was evident after hygiene is done cleaning ensuring all is cleared. If area not cleaned are report to Hygiene Manager and QA Manager.<br><u>Torch checks:</u><br>All torches used in storage, despatch, intake, and inspection areas must be visually checked before to confirm lens is intact, secure, and free from cracks or chips, no loose parts, exposed bulbs, or damaged casing, battery compartment is secure and fully enclosed, torch is clean and fit for use. If a torch is found damaged or not intact before use do not use the torch, report to area leader and remove immediately from the warehouse. If a torch is found damaged or not intact after use report to area leader and QA/Technical. Record results of the checks and any corrective actions. Torches must not be left on product, pallets, or food-contact surfaces.</div>';

  var docFooter='<table style="width:100%;border-collapse:collapse;margin-top:auto;font-size:7.5pt;border:1px solid #000">'
    +'<tr>'
    +'<td style="border:1px solid #000;padding:3px;width:60px;text-align:center;vertical-align:middle">'
    +'<img src="'+TAIKO_LOGO+'" style="width:40px;height:40px;object-fit:contain"/>'
    +'</td>'
    +'<td style="border:1px solid #000;padding:3px;text-align:center">Doc ref<br><strong>4.14 QA135-01</strong></td>'
    +'<td style="border:1px solid #000;padding:3px;text-align:center">Version<br><strong>5</strong></td>'
    +'<td style="border:1px solid #000;padding:3px;text-align:center">Issue Date<br><strong>23/01/2026</strong></td>'
    +'<td style="border:1px solid #000;padding:3px;text-align:center">Replaces Date<br><strong>21/08/2025</strong></td>'
    +'<td style="border:1px solid #000;padding:3px;text-align:center">Issued by<br><strong>J. Szewczyk</strong></td>'
    +'<td style="border:1px solid #000;padding:3px;text-align:center">Approved by<br><strong>P. Nathani</strong></td>'
    +'<td style="border:1px solid #000;padding:3px;text-align:center">Page<br><strong>PAGE_NUM of 5</strong></td>'
    +'</tr>'
    +'<tr><td colspan="8" style="border:1px solid #000;padding:3px;font-size:7.5pt"><strong>Reason for change:</strong> Added torch checks.</td></tr>'
    +'</table>';

  function tableHeader(){
    return '<table style="width:100%;border-collapse:collapse;font-size:8pt">'
      +'<tr style="background:#fff">'
      +'<th style="border:1px solid #000;padding:4px;width:18%">Area</th>'
      +'<th style="border:1px solid #000;padding:4px;width:9%">Intended Time of Check</th>'
      +'<th style="border:1px solid #000;padding:4px;width:9%">Actual Time of Check</th>'
      +'<th style="border:1px solid #000;padding:4px;width:8%">Pest activity evidence (Yes/No)</th>'
      +'<th style="border:1px solid #000;padding:4px;width:22%">Corrective Action</th>'
      +'<th style="border:1px solid #000;padding:4px;width:10%">Staff Sign &amp; Number</th>'
      +'<th style="border:1px solid #000;padding:4px;width:14%">Area Cleaned by Hygiene? (YES/NO/ N/A*)</th>'
      +'<th style="border:1px solid #000;padding:4px;width:10%">Staff Sign &amp; Number</th>'
      +'</tr>';
  }

  function torchRow(torchVal, torchAction, type){
    var display=torchVal?(torchVal==="Pass"?"Yes":"No"):"";
    var yStyle=torchVal==="Pass"?"font-weight:bold":"";
    var nStyle=torchVal==="Fail"?"font-weight:bold":"";
    return '<tr style="background:#fef9c3"><td colspan="8" style="border:1px solid #000;padding:4px;font-size:8pt">'
      +'Torch check '+type+' use compliant with the requirements? '
      +'<span style="'+yStyle+'">Yes</span> / <span style="'+nStyle+'">No</span>'
      +(torchVal?(' — <strong>'+display+'</strong>'):'')
      +'<br>Corrective actions: '+(torchAction||"")
      +'</td></tr>';
  }

  function areaRows(schedMin, entry){
    var areas=FUJI_MICE_AREAS;
    var intendedTime=fmtMin(schedMin);
    var rows="";
    for(var ai=0;ai<2;ai++){
      var aName=areas[ai];
      var pest="", ca="", hygiene="", staffName="", actualTime="";
      if(entry&&entry.areas&&entry.areas[ai]){
        var ar=entry.areas[ai];
        pest=ar.pestActivity||"";
        ca=ar.pestActivity==="Yes"?(ar.correctiveAction||""):"N/A";
        hygiene=ar.hygieneClean||"N/A";
        staffName=entry.name||"";
        actualTime=entry.loggedAt?new Date(entry.loggedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
      }
      rows+='<tr>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt">'+aName+'</td>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt;text-align:center">'+intendedTime+'</td>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt;text-align:center">'+actualTime+'</td>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt;text-align:center">'+pest+'</td>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt">'+ca+'</td>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt">'+staffName+'</td>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt;text-align:center">'+hygiene+'</td>'
        +'<td style="border:1px solid #000;padding:4px;font-size:8pt"></td>'
        +'</tr>';
    }
    return rows;
  }

  function buildPageContent(pageNum, timeMins, includeIntro){
    var entry0=checks[ckKey(ds,"Fuji","mice",timeMins[0])]||null;
    var html3='';
    // Header
    html3+='<div style="display:flex;align-items:center;border:2px solid #000;margin-bottom:4px">'
      +'<div style="padding:6px;border-right:2px solid #000"><img src="'+TAIKO_LOGO+'" style="width:55px;height:55px;object-fit:contain"/></div>'
      +'<div style="flex:1;text-align:center;padding:8px"><strong style="font-size:13pt">WAREHOUSE TWO HOURLY MICE DROPPING CHECK SHEET – FUJI BUILDING</strong></div>'
      +'</div>';
    if(includeIntro)html3+=introHTML;
    html3+='<div style="font-size:10pt;font-weight:bold;margin:6px 0">Date: '+dateLabel+'</div>';
    // First time slot
    html3+=tableHeader();
    html3+=torchRow(entry0?entry0.torchBefore:null, entry0?entry0.torchBeforeAction:"","before");
    html3+=areaRows(timeMins[0],entry0);
    html3+=torchRow(entry0?entry0.torchAfter:null, entry0?entry0.torchAfterAction:"","after");
    html3+='</table>';
    // Second time slot (if any)
    if(timeMins.length>1){
      var entry1=checks[ckKey(ds,"Fuji","mice",timeMins[1])]||null;
      html3+='<div style="margin-top:8px"></div>';
      html3+=tableHeader();
      html3+=torchRow(entry1?entry1.torchBefore:null, entry1?entry1.torchBeforeAction:"","before");
      html3+=areaRows(timeMins[1],entry1);
      html3+=torchRow(entry1?entry1.torchAfter:null, entry1?entry1.torchAfterAction:"","after");
      html3+='</table>';
    }
    // Footer
    html3+=docFooter.replace("PAGE_NUM",pageNum);
    return html3;
  }

  var pagesHTML="";
  for(var pi=0;pi<pageGroups.length;pi++){
    pagesHTML+='<div style="width:210mm;min-height:297mm;padding:12mm;box-sizing:border-box;display:flex;flex-direction:column;'+(pi>0?"page-break-before:always;":"")+'">'+buildPageContent(pi+1,pageGroups[pi],pi===0)+'</div>';
  }

  var fullHTML='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fuji Mice Check - '+dateLabel+'</title>'
    +'<style>@page{size:A4;margin:0}body{margin:0;font-family:Arial,Helvetica,sans-serif}@media print{.no-print{display:none}}</style>'
    +'</head><body>'
    +'<div class="no-print" style="position:fixed;top:0;left:0;right:0;background:#185FA5;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;z-index:999">'
    +'<span style="font-weight:600">Fuji Mice Dropping Check Sheet — '+dateLabel+'</span>'
    +'<button onclick="window.print()" style="background:#fff;color:#185FA5;border:none;padding:8px 18px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer">Print / Save PDF</button>'
    +'</div>'
    +'<div style="margin-top:50px">'+pagesHTML+'</div>'
    +'</body></html>';

  var w=window.open("","_blank");
  if(w){w.document.write(fullHTML);w.document.close();}
  else{addToast("Please allow popups to download the PDF","warn",5000);}
}

// ── admin actions ─────────────────────────────────────────────
function approveUser(key){var u=allUsers[key];if(!u)return;u.status="approved";dbWrite("/users/"+key,u).then(function(){allUsers[key]=u;addToast(u.displayName+" approved","ok",3000);render();}).catch(function(){addToast("Failed","danger",4000);});}
function rejectUser(key){dbDelete("/users/"+key).then(function(){delete allUsers[key];addToast("Request rejected","warn",3000);render();}).catch(function(){addToast("Failed","danger",4000);});}
function promoteUser(key){
  saving=true;render();var u=allUsers[key];if(!u){saving=false;return;}
  u.isAdmin=true;u.status="approved";
  dbWrite("/users/"+key,u).then(function(){allUsers[key]=u;saving=false;adminAction=null;addToast(u.displayName+" is now an admin","ok",3000);render();}).catch(function(){saving=false;addToast("Failed","danger",4000);render();});
}
function demoteUser(key){
  var u=allUsers[key];
  if(u&&u.isSuperAdmin){adminAction=null;addToast("The super admin cannot be removed","danger",4000);render();return;}
  saving=true;render();if(!u){saving=false;return;}
  u.isAdmin=false;u.status="approved";
  dbWrite("/users/"+key,u).then(function(){allUsers[key]=u;saving=false;adminAction=null;addToast(u.displayName+" is no longer an admin","warn",3000);render();}).catch(function(){saving=false;addToast("Failed","danger",4000);render();});
}
function removeUser(key){
  var u=allUsers[key];
  if(u&&u.isSuperAdmin){adminAction=null;addToast("The super admin cannot be removed","danger",4000);render();return;}
  saving=true;render();
  dbDelete("/users/"+key).then(function(){delete allUsers[key];saving=false;adminAction=null;addToast("User removed","warn",3000);render();}).catch(function(){saving=false;addToast("Failed","danger",4000);render();});
}

// ── assign / unassign ────────────────────────────────────────
function doAssign(site,type,schedMin,ds,targetName){
  var entry={assignedTo:targetName,assignedBy:myName,assignedAt:new Date().toISOString()};
  dbWrite(assignPath(ds,site,type,schedMin),entry).then(function(){
    assignments[ckKey(ds,site,type,schedMin)]=entry;
    assignModal=null;render();
    addToast(CHECK_CFG[type].label+" assigned to "+targetName,"ok",3000);
  }).catch(function(){addToast("Could not assign","danger",4000);});
}
function doUnassign(site,type,schedMin,ds){
  dbDelete(assignPath(ds,site,type,schedMin)).then(function(){
    delete assignments[ckKey(ds,site,type,schedMin)];
    render();addToast("Assignment removed","warn",3000);
  }).catch(function(){addToast("Could not remove","danger",4000);});
}

// ── log / delete ──────────────────────────────────────────────
function confirmLog(){
  if(!modal||saving||!myName)return;
  var type=modal.type;
  var photoRule=PHOTO_RULES[type]||{min:0,required:false};
  if(photoRule.required&&modalPhotos.length<photoRule.min){
    addToast("Please add at least "+photoRule.min+" photo"+(photoRule.min>1?"s":""),"danger",4000);return;
  }
  saving=true;uploadingPhotos=(modalPhotos.length>0);render();
  var site=modal.site,schedMin=modal.schedMin,ds=modal.ds;

  // Upload all staged photos to Cloudinary, then save log
  var uploadPromises=modalPhotos.map(function(p){return uploadToCloudinary(p.file);});
  Promise.all(uploadPromises).then(function(urls){
    uploadingPhotos=false;
    var entry={name:myName,loggedAt:new Date().toISOString()};
    if(modalComment.trim())entry.comment=modalComment.trim();
    if(urls.length>0)entry.photos=urls;
    // Fuji mice extra fields
    if(modal.site==="Fuji"&&modal.type==="mice"){
      entry.torchBefore=modalTorchBefore||"";
      entry.torchBeforeAction=modalTorchBeforeAction.trim();
      entry.torchAfter=modalTorchAfter||"";
      entry.torchAfterAction=modalTorchAfterAction.trim();
      entry.areas=modalAreas.map(function(a,i){
        return {
          name:FUJI_MICE_AREAS[i],
          pestActivity:a.pestActivity||"",
          correctiveAction:a.pestActivity==="Yes"?a.correctiveAction.trim():"N/A",
          hygieneClean:a.pestActivity==="Yes"?(a.hygieneClean||"N/A"):"N/A"
        };
      });
    }
    return dbWrite(dbPath(ds,site,type,schedMin),entry).then(function(){
      checks[ckKey(ds,site,type,schedMin)]=entry;
      saving=false;modal=null;modalPhotos=[];modalComment="";render();
      addToast(site+" &mdash; "+CHECK_CFG[type].label+" logged","ok",4000);
    });
  }).catch(function(err){
    uploadingPhotos=false;saving=false;
    addToast("Photo upload failed — check connection","danger",6000);render();
  });
}
function deleteLog(){
  if(!modal||saving)return;
  saving=true;render();
  var site=modal.site,type=modal.type,schedMin=modal.schedMin,ds=modal.ds;
  dbDelete(dbPath(ds,site,type,schedMin)).then(function(){
    delete checks[ckKey(ds,site,type,schedMin)];saving=false;modal=null;render();
    addToast("Log deleted","warn",4000);
  }).catch(function(){saving=false;addToast("Could not delete","danger",6000);render();});
}

// ── photo upload to Cloudinary ────────────────────────────────
function compressAndStage(file, callback){
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var MAX = 1200;
      var w = img.width, h = img.height;
      if(w > MAX){h = Math.round(h*MAX/w); w = MAX;}
      if(h > MAX){w = Math.round(w*MAX/h); h = MAX;}
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var TARGET = 400 * 1024; // 400KB target

      // Try reducing quality until under 400KB
      function tryQuality(q){
        canvas.toBlob(function(blob){
          if(blob.size <= TARGET || q <= 0.3){
            // Good enough
            var compressed = new File([blob], 'photo.jpg', {type:'image/jpeg'});
            var dataUrl = canvas.toDataURL('image/jpeg', q);
            callback({dataUrl:dataUrl, file:compressed});
          } else {
            // Still too big — reduce quality and try again
            tryQuality(Math.round((q - 0.1) * 10) / 10);
          }
        }, 'image/jpeg', q);
      }
      tryQuality(0.8);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function uploadToCloudinary(file){
  var fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  fd.append('folder', 'wh_checks');
  return fetch(STORAGE_URL, {method:'POST', body:fd})
    .then(function(r){return r.json();})
    .then(function(data){return data.secure_url;});
}

function addToast(msg,kind,ms){if(!ms)ms=8000;var id=Date.now()+Math.random();toasts=toasts.slice(-2).concat([{id:id,msg:msg,kind:kind}]);render();setTimeout(function(){toasts=toasts.filter(function(t){return t.id!==id;});render();},ms);}

// ── alerts ────────────────────────────────────────────────────
function checkAlerts(){
  var nm=nowMins(),ds=dstr(now);
  function push(title,body,kind){addToast(body,kind,10000);if(notifPerm==="granted"){try{new Notification(title,{body:body});}catch(e){}}}
  for(var i=0;i<SITES.length;i++){
    var site=SITES[i],tk=Object.keys(SCH[site]);
    for(var j=0;j<tk.length;j++){
      var type=tk[j],win=CHECK_CFG[type]||{earlyMins:15,lateMins:15},mins=SCH[site][type];
      for(var k=0;k<mins.length;k++){
        var schedMin=mins[k],diff=nm-schedMin;
        var ck=ckKey(ds,site,type,schedMin);
        // Alert earlyMins before (i.e. diff === -earlyMins exactly, check within 1 min window)
        if(diff>=-win.earlyMins&&diff<-(win.earlyMins-1)){
          var nk=nfKeyFn(ds,site,type,schedMin,"pre");
          if(notifiedArr.indexOf(nk)<0&&!checks[ck]){notifiedArr.push(nk);saveNotified(notifiedArr);push("Check due soon",site+" - "+CHECK_CFG[type].label+" due at "+fmtMin(schedMin),"warn");}
        }
        // Alert at lateMins after
        if(diff>=win.lateMins&&diff<win.lateMins+1){
          var nk=nfKeyFn(ds,site,type,schedMin,"late");
          if(notifiedArr.indexOf(nk)<0&&!checks[ck]){notifiedArr.push(nk);saveNotified(notifiedArr);push("Check missed!",site+" - "+CHECK_CFG[type].label+" at "+fmtMin(schedMin)+" was not completed","danger");}
        }
      }
    }
  }
}

// ── start ─────────────────────────────────────────────────────
render();
loadMyStatus();
setInterval(function(){now=new Date();checkAlerts();render();},60000);
